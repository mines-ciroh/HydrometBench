protocol:
  name: "Seasonal Water Supply Forecasting (WSF) in the Western US"
  protocol_id: P2
  version: 1.1

  metadata:
    focus_objective: Evaluate seasonal WSF performance across multiple verification features

    observations:
      - Naturalized (adjusted) seasonal streamflow volumes

    baseline_forecasts:
      - USDA-NRCS statistical WSFs
      - Western RFC ESP-based WSFs
      - California DWR statistical WSFs
      - Climatology

    experimental_design:
      spatial: Bureau of Reclamation WSF Rodeo basins (n = 26)
      study_period: "WY1990-WY2023"
      test_period_start: "WY2004"
      test_period_end: "WY2023"
      train_period_start: "WY1990"
      train_period_end: "WY2023"
      cross_val_method: "year-wise LOOCV"

      fcst_inits:
        - Jan 1
        - Feb 1
        - Mar 1
        - Apr 1

      target_periods:
        primary: "Apr-Jul seasonal volume"
        new_mexico_exception: "Mar-Jul seasonal volume"

      probabilistic_fcst_probs:
        minimum:
          - f10
          - f50
          - f90
        recommended:
          - f30
          - f70

      lead_times_months: [0, 1, 2, 3]

    operational_metadata:
      - input data stability and coverage
      - operational latency and runtime requirements
      - forecaster training/input requirements
      - documentation availability
      - proprietary dependencies

    references_and_related_activities:
      - Bureau of Reclamation, 2025, Water Supply Forecast Rodeo. DrivenData. https://www.drivendata.org/competitions/group/reclamation-water-supply-forecast/
      - Pagano, T., et al., 2004, Evaluation of Official Western U.S. Seasonal Water Supply Outlooks, 1922–2002, Journal of Hydrometeorology, 5, 896–909, https://doi.org/10.1175/1525-7541(2004)005<0896:EOOWUS>2.0.CO;2
      - Wood, A., and Lettenmaier, D., 2006, A Test Bed for New Seasonal Hydrologic Forecasting Approaches in the Western United States, Bull. Amer. Meteor. Soc., 1699–1712, https://doi.org/10.1175/BAMS-87-12-1699

    contacts:
      contact_1:
        name: Josh Sturtevant
        email: joshua_sturtevant@mines.edu

      contact_2:
        name: Andy Wood
        email: awwood@mines.edu

  performance_metrics:

    rmse:
      description: Root Mean Square Error (RMSE) of seasonal flow volume forecasts
      expected_value: float
      units: "volume"
      lead_times: [0, 1, 2, 3]

    percent_bias:
      description: Percent bias of seasonal flow volume forecasts relative to observations
      expected_value: float
      units: "%"
      lead_times: [0, 1, 2, 3]

    r2:
      description: Coefficient of determination (R²) between forecast and observed seasonal volumes
      expected_value: float
      units: N/A
      lead_times: [0, 1, 2, 3]

    normalized_skill_score:
      description: Skill score relative to climatology using normalized RMSE
      expected_value: float
      units: N/A
      lead_times: [0, 1, 2, 3]

    crps:
      description: Continuous Ranked Probability Score (CRPS) for probabilistic seasonal forecasts
      expected_value: float
      units: N/A
      lead_times: [0, 1, 2, 3]

    crpss:
      description: Continuous Ranked Probability Skill Score (CRPSS) relative to climatology
      expected_value: float
      units: N/A
      lead_times: [0, 1, 2, 3]

    reliability_diagrams:
      description: Reliability assessment of exceedance-probability forecasts
      expected_value: diagnostic_plot

    sharpness_diagrams:
      description: Assessment of forecast spread and sharpness relative to climatology
      expected_value: diagnostic_plot

  computational_metadata:

    dataset_dependency_stability:
      description: Stability and long-term availability of datasets required by the forecast method
      expected_values: [low, medium, high]
      provided_by: modeler

    operational_latency:
      description: Expected latency or delay associated with operational forecast production
      expected_values: [low, medium, high]
      provided_by: modeler

    forecaster_training:
      description: Level of forecaster training or expert intervention required
      expected_values: [none, basic, advanced]
      provided_by: modeler

    documentation_availability:
      description: Availability and completeness of method documentation
      expected_values: [available, partial, none]
      provided_by: modeler

    proprietary_dependencies:
      description: Dependence on proprietary datasets, software, or methods
      expected_values: [yes, no]
      provided_by: modeler